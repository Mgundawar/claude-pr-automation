name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

jobs:
  claude-review:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff
        id: diff
        uses: actions/github-script@v7
        with:
          script: |
            const { data: prData } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });
            
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });
            
            console.log(`PR: ${prData.title}`);
            console.log(`Files changed: ${files.length}`);
            files.forEach(file => {
              console.log(`  - ${file.filename} (+${file.additions}/-${file.deletions})`);
            });

      - name: Run Claude Review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Please review this pull request thoroughly and provide detailed, actionable feedback.
            
            PR Title: "${{ github.event.pull_request.title }}"
            PR Description: "${{ github.event.pull_request.body }}"
            
            Focus your review on:
            
            1. **Security Issues** - Look for hardcoded secrets, SQL injection, authentication flaws, etc.
            2. **Code Quality** - Check for poor naming, complex logic, dead code, etc.
            3. **Best Practices** - Are design patterns and standards followed?
            4. **Error Handling** - Is error handling sufficient?
            5. **Performance** - Any performance concerns?
            6. **Testing** - Are there tests? Is coverage adequate?
            7. **Documentation** - Are changes documented?
            
            Provide SPECIFIC examples from the code with line references where possible.
            
            Format your response as a clear, structured review that will be helpful to the developer.
            Be constructive and professional.

      - name: Post review comment
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## 🤖 Claude Code Review\n\nReview completed. Please see the analysis above for detailed feedback on code quality, security, and best practices.`
            })
